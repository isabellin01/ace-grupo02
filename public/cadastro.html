        <section class="cadastro">
            <div>
                <h2>Cadastro</h2>

                <label>Usuário</label>

                <input type="email" placeholder="email@teste.com">

                <input type="text" placeholder="">

                <input type="password" placeholder="********">
                <span>(8 caracteres com letras e números)</span>
                <button>Cadastrar</button>
            </div>
            <div>
                <img src="../Assets/cadastro.png">
            </div>
